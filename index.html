<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Quickly calculate your NPTEL assignment scores." />
    <title>NPTEL Assignment Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>

    <header>
      <div class="header-inner">
        <span class="header-badge">NPTEL</span>
        <div class="header-divider"></div>
        <span class="header-title">Assignment <span>Calculator</span></span>
      </div>
    </header>

    <main>
      <p class="page-eyebrow">Academic Tool</p>
      <h1>Score Calculator</h1>
      <p class="page-subtext">Enter your weekly assignment scores to compute your weighted NPTEL assignment score accurately.</p>
      <div class="divider"></div>
      <div class="notice">
        <i class="fas fa-info-circle"></i>
        Best of <strong>N–2</strong> weeks are counted towards your final score.
      </div>

      <div class="card" id="top-container">
        <div class="card-label">Step 1 — Select Course Duration</div>
        <form>
          <div class="form-row">
            <div class="form-group">
              <label for="weeks" id="label">Course Duration</label>
              <select name="weeks" id="weeks">
                <option value="4">4 Weeks</option>
                <option value="8">8 Weeks</option>
                <option value="12">12 Weeks</option>
              </select>
            </div>
            <button type="submit" id="btn" class="btnStyle">
              <i class="fas fa-arrow-right"></i> Continue
            </button>
          </div>
        </form>
      </div>

      <div id="inputBox"></div>
      <div id="resultBox"></div>
      <div id="resetDiv"></div>
    </main>

    <footer class="footer" id="footer">
      <div class="footer-inner">
        <p class="footer-title">Get in touch</p>
        <div class="social">
          <a href="https://www.linkedin.com/in/prashanth-santhanaraman"><i class="fab fa-linkedin-in"></i></a>
          <a href="https://github.com/Prashanth-Santhanaraman"><i class="fab fa-github"></i></a>
        </div>
        <p class="copyright">Prashanth Santhanaraman &copy; 2026</p>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
